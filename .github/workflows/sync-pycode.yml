name: Sync pycode folder

on:
  workflow_dispatch:   # manual trigger
  schedule:
    - cron: '0 0 * * *'   # daily at midnight

jobs:
  sync-folder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout collaborator repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure pycode folder exists
        run: mkdir -p pycode

      - name: Download all files from DL-Project1/pycode
        run: |
          curl -L https://api.github.com/repos/bhashkar1/DL-Project1/contents/pycode \
          | jq -r '.[] | .download_url' \
          | xargs -n 1 curl -O
        working-directory: pycode

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pycode/
          git commit -m "Sync pycode folder from DL-Project1" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
