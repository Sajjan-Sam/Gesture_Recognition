name: Sync fusion_split.py

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout collaborator repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure pycode folder exists
        run: mkdir -p pycode

      - name: Download fusion_split.py
        run: curl -o pycode/fusion_split.py https://raw.githubusercontent.com/bhashkar1/DL-Project1/main/pycode/fusion_split.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pycode/fusion_split.py
          git commit -m "Sync fusion_split.py from DL-Project1" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
